<!doctype html>
<html lang="en" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <title>Message from TAK Portal</title>

  <!--[if mso]>
    <noscript>
      <xml>
        <o:OfficeDocumentSettings>
          <o:PixelsPerInch>96</o:PixelsPerInch>
        </o:OfficeDocumentSettings>
      </xml>
    </noscript>
  <![endif]-->

  <style>
    html, body { margin:0 !important; padding:0 !important; width:100% !important; height:100% !important; }
    table, td { border-collapse:collapse !important; }
    table { mso-table-lspace:0pt; mso-table-rspace:0pt; }
    td { mso-line-height-rule:exactly; }
    a { text-decoration:underline; }

    @media screen and (max-width: 620px) {
      .container { width:100% !important; }
      .px { padding-left:16px !important; padding-right:16px !important; }
    }

    @media (prefers-color-scheme: dark) {
      body { background:#0b0f17 !important; }
      .text { color:#f3f4f6 !important; }
      .muted { color:#cbd5e1 !important; }
      .rule { border-color:#243044 !important; }
      .highlight { background:#0f172a !important; }
      .hl-border { border-color:#243044 !important; }
      .labelText { color:#cbd5e1 !important; }
      a:not(.btn-link) { color:#93c5fd !important; }
      .btn-link, .btn-link span { color:#ffffff !important; }
    }

    [data-ogsc] body { background:#0b0f17 !important; }
    [data-ogsc] .text { color:#f3f4f6 !important; }
    [data-ogsc] .muted { color:#cbd5e1 !important; }
    [data-ogsc] .rule { border-color:#243044 !important; }
    [data-ogsc] .highlight { background:#0f172a !important; }
    [data-ogsc] .hl-border { border-color:#243044 !important; }
    [data-ogsc] .labelText { color:#cbd5e1 !important; }
    [data-ogsc] a:not(.btn-link) { color:#93c5fd !important; }
    [data-ogsc] .btn-link, [data-ogsc] .btn-link span { color:#ffffff !important; }
  </style>
</head>

<body style="margin:0; padding:0; background:#ffffff;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" bgcolor="#ffffff" style="background:#ffffff;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" class="container" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px; max-width:600px;">
          <tr>
            <td class="px" style="padding:0 24px; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;">

              <h2 class="text" style="margin:0 0 12px; font-size:20px; line-height:28px; color:#111827; font-weight:700;">
                {{subject}}
              </h2>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:16px 0 12px;">
                <tr>
                  <td class="rule" style="border-top:1px solid #e5e7eb; height:1px; line-height:1px; font-size:0;">&nbsp;</td>
                </tr>
              </table>

              <div class="text" style="margin:0 0 12px; font-size:14px; line-height:21px; color:#111827;">
                {{{messageBody}}}
              </div>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:16px 0;">
                <tr>
                  <td class="rule" style="border-top:1px solid #e5e7eb; height:1px; line-height:1px; font-size:0;">&nbsp;</td>
                </tr>
              </table>

              <p class="muted" style="margin:0; font-size:11px; line-height:16px; color:#9ca3af;">
                This message was sent by the TAK Portal. Please do not reply to this email.
              </p>

            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
